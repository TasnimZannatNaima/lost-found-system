<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Lost & Found System - Search & Notifications</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <nav class="navbar navbar-expand-lg navbar-dark" id="mainNav">
        <div class="container">
            <a class="navbar-brand" href="#">
                <i class="fas fa-search-location me-2"></i>Lost & Found
            </a>
            <button class="navbar-toggler" type="button" data-bs-toggle="collapse" data-bs-target="#navbarNav">
                <span class="navbar-toggler-icon"></span>
            </button>
            <div class="collapse navbar-collapse" id="navbarNav">
                <ul class="navbar-nav ms-auto align-items-center" id="navMenu"></ul>
            </div>
        </div>
    </nav>

    <div class="container" id="mainContent"></div>

    <footer class="footer mt-5 py-4">
        <div class="container text-center">
            <p class="mb-0">&copy; 2024 Lost & Found System · Search & Email Notifications Enabled</p>
        </div>
    </footer>

    <!-- Modals -->
    <div class="modal fade" id="authModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0">
                    <h4 class="modal-title fw-bold" id="modalTitle">Login</h4>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body" id="modalBody"></div>
            </div>
        </div>
    </div>

    <div class="modal fade" id="claimModal" tabindex="-1">
        <div class="modal-dialog modal-dialog-centered">
            <div class="modal-content">
                <div class="modal-header border-0 bg-primary text-white">
                    <h4 class="modal-title fw-bold"><i class="fas fa-hand-paper me-2"></i>Claim This Item</h4>
                    <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <div id="claimItemInfo" class="mb-3 p-3 bg-light rounded"></div>
                    <form id="claimForm">
                        <input type="hidden" id="claimItemId">
                        <div class="mb-3">
                            <label class="form-label fw-semibold">
                                <i class="fas fa-file-alt me-1"></i>Proof of Ownership *
                            </label>
                            <textarea class="form-control" id="claimProof" rows="4" 
                                placeholder="Describe identifying features..." required></textarea>
                        </div>
                    </form>
                </div>
                <div class="modal-footer border-0">
                    <button type="button" class="btn btn-secondary rounded-pill" data-bs-dismiss="modal">Cancel</button>
                    <button type="button" class="btn btn-primary rounded-pill" onclick="submitClaim()">Submit Claim</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
    <script src="js/app.js"></script>
</body>
</html>
